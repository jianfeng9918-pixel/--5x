<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" rx="32" fill="#F8F2EA"/>
  <rect x="40" y="40" width="1120" height="620" rx="28" fill="#FFFDF9" stroke="#E9DCCB" stroke-width="4"/>
  <text x="82" y="110" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#BE4B2C">海底捞最值得看的系统焦点</text>
  <text x="82" y="150" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="18" fill="#6B5F55">服务型品牌不是靠一两个惊喜动作成立，而是把“人、服务、运营”长期组织成稳定体验。</text>

  <circle cx="600" cy="356" r="125" fill="#C84B31"/>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="44" font-weight="800" fill="#FFF8F1">海底捞</text>
  <text x="600" y="386" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#FFF8F1">服务型品牌系统</text>

  <rect x="150" y="180" width="180" height="92" rx="22" fill="#FFF3EA" stroke="#E7C9B5" stroke-width="3"/>
  <text x="240" y="222" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#3A332E">人</text>
  <text x="240" y="252" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="16" fill="#6B5F55">员工即体验承载者</text>

  <rect x="870" y="180" width="180" height="92" rx="22" fill="#FFF3EA" stroke="#E7C9B5" stroke-width="3"/>
  <text x="960" y="222" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#3A332E">品牌建设</text>
  <text x="960" y="252" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="16" fill="#6B5F55">服务心智稳定形成</text>

  <rect x="118" y="432" width="210" height="92" rx="22" fill="#FFF3EA" stroke="#E7C9B5" stroke-width="3"/>
  <text x="223" y="474" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#3A332E">产品</text>
  <text x="223" y="504" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="16" fill="#6B5F55">稳定承接服务底盘</text>

  <rect x="872" y="432" width="210" height="92" rx="22" fill="#FFF3EA" stroke="#E7C9B5" stroke-width="3"/>
  <text x="977" y="474" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#3A332E">品牌运营</text>
  <text x="977" y="504" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="16" fill="#6B5F55">把服务变成可复制能力</text>

  <rect x="490" y="120" width="220" height="72" rx="20" fill="#FEF7EE" stroke="#E7C9B5" stroke-width="3"/>
  <text x="600" y="165" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#3A332E">品牌传播</text>

  <rect x="470" y="540" width="260" height="72" rx="20" fill="#FEF7EE" stroke="#E7C9B5" stroke-width="3"/>
  <text x="600" y="585" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#3A332E">渠道 / 门店体验入口</text>

  <line x1="510" y1="245" x2="555" y2="287" stroke="#D88B68" stroke-width="4"/>
  <line x1="690" y1="287" x2="840" y2="236" stroke="#D88B68" stroke-width="4"/>
  <line x1="480" y1="430" x2="330" y2="470" stroke="#D88B68" stroke-width="4"/>
  <line x1="720" y1="430" x2="872" y2="470" stroke="#D88B68" stroke-width="4"/>
  <line x1="600" y1="231" x2="600" y2="192" stroke="#D88B68" stroke-width="4"/>
  <line x1="600" y1="481" x2="600" y2="540" stroke="#D88B68" stroke-width="4"/>

  <text x="82" y="618" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="18" fill="#6B5F55">最值得学什么：把服务组织成长期稳定的品牌进入理由。</text>
  <text x="82" y="648" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="18" fill="#6B5F55">不要直接照抄什么：具体服务动作本身；真正难的是背后的组织、培训与运营承接。</text>
